apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuard
  annotations:
    kubernetes.io/change-cause: "Update to green kuard"
  labels:
    app: kuard
    run: kuard
    env: dev
spec:
  selector:
    matchLabels:
      run: kuard
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  replicas: 3
  template:
    metadata:
      labels:
        run: kuard
      annotations:
        kubernetes.io/change-cause: "Update to green kuard"
    spec:
      containers:
        - name: kuard
          image: docker.io/roboticcheese/kuard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
